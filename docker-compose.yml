services:
  packcampus:
    build:
      context: .
      args:
        PUBLIC_GHOST_URL: ${PUBLIC_GHOST_URL}
        PUBLIC_GHOST_CONTENT_API_KEY: ${PUBLIC_GHOST_CONTENT_API_KEY}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        SITE_PASSWORD: ${SITE_PASSWORD}
    network_mode: host
    volumes:
      - feedback-data:/app/data
      - ghost_ghost_content:/ghost-content
    env_file:
      - .env
    restart: unless-stopped

volumes:
  feedback-data:
  ghost_ghost_content:
    external: true
